spring:
  application:
    name: aimatrix

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aimatrix}?currentSchema=public
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION:60000}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:true}
    open-in-view: false
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}
  ai:
    model:
      embedding: ${AI_MODEL_EMBEDDING:dashscope}
    vectorstore:
      pgvector:
        index-type: ${PGVECTOR_INDEX_TYPE:HNSW}
        distance-type: ${PGVECTOR_DISTANCE_TYPE:COSINE_DISTANCE}
        dimensions: ${PGVECTOR_DIMENSIONS:1024}
        table-name: ${PGVECTOR_TABLE_NAME:vector_store}
        initialize-schema: ${PGVECTOR_INITIALIZE_SCHEMA:true}
        schema-validation: ${PGVECTOR_SCHEMA_VALIDATION:true}  
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: ${AI_DASHSCOPE_CHAT_MODEL}
      embedding:
        options:
          model: ${AI_DASHSCOPE_EMBEDDING_MODEL:text-embedding-v3}
          dimensions: ${AI_DASHSCOPE_EMBEDDING_DIMENSIONS:1024}
#    openai:
#      api-key: ${OPENAI_API_KEY}
#      base-url: ${OPENAI_BASE_URL}
#      chat:
#        options:
#          model: ${OPENAI_CHAT_MODEL:qwen3.7-max-2026-05-20}
#          temperature: ${OPENAI_TEMPERATURE:0.7}

server:
  port: ${SERVER_PORT:8080}

# Agent配置
agent:
  name: ${AGENT_NAME:aimatrix-agent}
  max-iterations: ${AGENT_MAX_ITERATIONS:10}